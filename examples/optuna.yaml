study:
  direction: minimize
  study_name: example
  storage: sqlite:///optuna.db
  load_if_exists: true

objective:
  metric: val_loss
  enable_pruning: true

output:
  best_config_path: null

n_trials: 20

search_space:
  model:
    lr:
      type: float
      low: 0.0001
      high: 0.1
      log: true
    hidden_size:
      type: categorical
      choices: [32, 64, 128]
