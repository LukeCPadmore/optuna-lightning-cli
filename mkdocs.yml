site_name: optuna-lightning-cli
repo_url: https://github.com/LukeCPadmore/optuna-lightning-cli

theme:
  name: material

nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true